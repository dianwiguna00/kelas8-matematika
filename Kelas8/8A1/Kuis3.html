<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematikar</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  text-align:center;
  margin:0;
}
.container {
  max-width:800px;
  margin:30px auto;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
h1{color:#333}

.question{
  font-size:20px;
  margin:20px 0;
  white-space:pre-line;
}

.question-img{
  margin-top:10px;
  max-width:100%;
  max-height:300px;
  border-radius:10px;
}

input{
  padding:10px;
  font-size:18px;
  width:150px;
  text-align:center;
}

button{
  margin:6px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{background:#45a049}

.feedback{
  margin-top:15px;
  font-size:18px;
}

.score-board{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

.team{
  padding:10px;
  border-radius:10px;
  background:#f0f0f0;
}

.active{
  background:#c8f7c5;
  font-weight:bold;
}

.timer{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
  color:#d9534f;
}

/* warna juara */
.rank1{background:gold}
.rank2{background:silver}
.rank3{background:#cd7f32}
</style>
</head>

<body>

<div class="container">
<h1>🎮 Kuis Matematika</h1>
<h3>Operasi Penjumlahan dan Pengurangan Bilangan Bulat</h3>

<button onclick="toggleFullscreen()">🔳 Full Screen</button>

<div class="timer" id="timer">Waktu: 02:00</div>

<div class="score-board">
<div id="team1" class="team active"></div>
<div id="team2" class="team"></div>
<div id="team3" class="team"></div>
<div id="team4" class="team"></div>
</div>

<div class="question" id="question"></div>

<img id="questionImg" class="question-img" style="display:none">

<input type="text" id="answer" placeholder="Ketik jawaban..." />
<br>

<button onclick="checkAnswer()">Jawab</button>
<button onclick="switchTeam()">Ganti Regu</button>

<div class="feedback" id="feedback"></div>
</div>

<script>

// ================= SOAL =================
let questions = [
{
  q: "Hitung hasil dari (–8) + (–4):",
  a: "-12",
  img: ""
},
{
  q: "Hitung hasil dari 7 + (–10):",
  a: "-3",
  img: ""
},
{
  q: "Hitung hasil dari (–3) + 5:",
  a: "2",
  img: ""
},
{
  q: "Hitung hasil dari 6 – (–2):",
  a: "8",
  img: ""
},
{
  q: "Seorang pemain kehilangan 5 poin, lalu mendapatkan 8 poin. Berapa total poinnya?",
  a: "3",
  img: ""
}

];

// ================= DATA =================
let currentQuestion = 0;
let scores=[0,0,0,0];
let wrongs=[0,0,0,0];
let currentTeam=0;
let timeLeft = 3600;
let timerInterval;

// ================= TIMER =================
function startTimer(){
  timerInterval = setInterval(()=>{
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    s = s < 10 ? '0' + s : s;

    document.getElementById("timer").innerText = `Waktu: ${m}:${s}`;

    if(timeLeft <= 0){
      clearInterval(timerInterval);
      endGame();
    }

    timeLeft--;
  },1000);
}

// ================= AKHIR GAME =================
function endGame(){
  let finalScores = scores.map((b,i)=> b - wrongs[i]);

  let ranking = finalScores
    .map((s,i)=>({team:i+1, skor:s, benar:scores[i], salah:wrongs[i]}))
    .sort((a,b)=>b.skor-a.skor);

  let hasil = "⏰ Waktu Habis!\n\n";

  ranking.forEach((r,i)=>{
    hasil += `#${i+1} Regu ${r.team} → Benar: ${r.benar} | Salah: ${r.salah} | Skor: ${r.skor}\n`;
  });

  hasil += `\n🏆 Juara: Regu ${ranking[0].team}`;

  document.getElementById("question").innerText = hasil;
}

// ================= SOAL =================
function showQuestion(){

  if(currentQuestion < questions.length){

    document.getElementById("question").innerText = questions[currentQuestion].q;

    let img = document.getElementById("questionImg");

    if(questions[currentQuestion].img){
      img.src = questions[currentQuestion].img;
      img.style.display = "block";
    } else {
      img.style.display = "none";
    }

  } else {

    document.getElementById("question").innerText = "Soal habis, tunggu waktu selesai";
    document.getElementById("questionImg").style.display="none";

  }

  document.getElementById("answer").value="";
  document.getElementById("feedback").innerText="";
}

// ================= CEK JAWABAN =================
function checkAnswer(){
  let user = document.getElementById("answer").value.trim().toLowerCase();
  let correct = String(questions[currentQuestion].a).trim().toLowerCase();

  if(currentQuestion >= questions.length) return;

  if(user === correct){

    scores[currentTeam]++;
    document.getElementById("feedback").innerText="✅ Benar!";
    updateScore();

    setTimeout(()=>{
      currentQuestion++;
      showQuestion();
    }, 500);

  } else {

    wrongs[currentTeam]++;
    document.getElementById("feedback").innerText="❌ Salah! Coba lagi";
    updateScore();

  }

  document.getElementById("answer").value="";
}

// ================= UPDATE SKOR =================
function updateScore(){
  for(let i=0;i<4;i++){
    let skor = scores[i] - wrongs[i];
    document.getElementById("team"+(i+1)).innerText =
      `Regu ${i+1} | Benar: ${scores[i]} | Salah: ${wrongs[i]} | Skor: ${skor}`;
  }
}

// ================= GANTI REGU =================
function switchTeam(){
  document.getElementById("team"+(currentTeam+1)).classList.remove("active");
  currentTeam=(currentTeam+1)%4;
  document.getElementById("team"+(currentTeam+1)).classList.add("active");
}

// ================= FULLSCREEN =================
function toggleFullscreen(){
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

// ================= START =================
updateScore();
showQuestion();
startTimer();

</script>

<h3>Dian Wiguna</h3>

</body>
</html>
